#数据库
    spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
    #allowMultiQueries=true的意思是支持多条sql语句一次性传给mysql
    spring.datasource.url=jdbc:mysql://127.0.0.1:3306/logindatainfo?useUnicode=true&characterEncoding=utf8&allowMultiQueries=true
    spring.datasource.username=root
    spring.datasource.password=cai123!
    #druid连接配置，数据库连接异常最多连接10次，防止死循环。
    spring.datasource.druid.connection-error-retry-attempts=10
    #数据库分页插件配置
    pagehelper.helper-dialect=mysql
    pagehelper.params=count=countSql
    pagehelper.reasonable=true
    pagehelper.support-methods-arguments=true

