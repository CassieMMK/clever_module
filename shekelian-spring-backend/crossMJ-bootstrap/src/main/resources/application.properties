spring.profiles.include=test
spring.profiles.active=test
#mybatis mapper文件位置
mybatis.mapper-locations=classpath*:/mapper/*.xml
#显式日志读取配置
logging.config=classpath:log4j2.xml
#actuator监控器配置
management.endpoints.web.exposure.include=health,info,loggers

#spring 文件上传multipart上传大小配置
# 单个文件最大为20M
spring.servlet.multipart.max-file-size = 20MB
#单次请求文件总数大小为20M
spring.servlet.multipart.max-request-size = 20MB

#线程池参数
default.threadPool.coreThreadNum=50
default.threadPool.maxThreadNum=100
default.threadPool.queueSize=200

#阻塞队列参数
blockingStringQueue.numElements=1000

#worker
scheduling.enabled=true
#每30分钟执行一次用户访问记录落库
visitorRecord.worker.cron=0 0/30 * * * ?

#discord proxy, 域名必须填写http://开头，不能只填ip
#discord请求超时时间（ms）
#controller日期序列化方式
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8